<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --card:#13131a;
  --card2:#17171f;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --purple:#7c3aed;
  --purple2:#9333ea;
  --blue:#3b82f6;
  --txt:#ffffff;
  --txt2:rgba(255,255,255,0.55);
  --txt3:rgba(255,255,255,0.35);
  --grad:linear-gradient(135deg,#7c3aed,#3b82f6);
  --grad2:linear-gradient(135deg,#8b5cf6,#6366f1);
  --f:'Inter',sans-serif;
}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:var(--f);line-height:1.5;overflow-x:hidden;min-height:100vh;padding-bottom:80px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.4);border-radius:2px}

/* Gradient text */
.g-text{background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Buttons */
button{font-family:var(--f);cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;outline:none}
.btn-main{width:100%;padding:17px 24px;background:linear-gradient(135deg,#7c3aed,#6366f1,#3b82f6);color:#fff;font-size:17px;font-weight:700;border-radius:50px;letter-spacing:0.01em;transition:all .2s;box-shadow:0 8px 32px rgba(124,58,237,0.4);position:relative;overflow:hidden}
.btn-main:active{transform:scale(0.98);box-shadow:0 4px 16px rgba(124,58,237,0.3)}
.btn-grad{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;font-size:14px;font-weight:700;border-radius:50px;transition:all .2s;box-shadow:0 4px 20px rgba(124,58,237,0.35)}
.btn-grad:hover{opacity:.9;transform:translateY(-1px)}
.btn-grad:active{transform:scale(.97)}
.btn-grad:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;background:rgba(255,255,255,0.06);color:var(--txt2);font-size:14px;font-weight:600;border-radius:50px;border:1px solid var(--border2);transition:all .2s}
.btn-outline:hover{background:rgba(255,255,255,0.1);color:var(--txt)}
.btn-copy{background:rgba(124,58,237,0.15);color:#a78bfa;border:1px solid rgba(124,58,237,0.25);padding:7px 14px;font-size:12px;font-weight:700;border-radius:8px;transition:all .18s;white-space:nowrap}
.btn-copy:hover{background:rgba(124,58,237,0.25)}
.btn-copy.done{background:rgba(16,185,129,0.15);color:#6ee7b7;border-color:rgba(16,185,129,0.3)}
.btn-example{background:rgba(59,130,246,0.12);color:#93c5fd;border:1px solid rgba(59,130,246,0.22);padding:7px 14px;font-size:12px;font-weight:600;border-radius:8px;transition:all .18s}
.btn-example:hover{background:rgba(59,130,246,0.22)}

/* Inputs */
input,textarea,select{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:14px;color:#fff;font-family:var(--f);font-size:15px;outline:none;transition:all .2s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:rgba(124,58,237,0.6);background:rgba(124,58,237,0.07);box-shadow:0 0 0 3px rgba(124,58,237,0.12)}
input::placeholder,textarea::placeholder{color:var(--txt3)}
textarea{resize:vertical;min-height:90px;line-height:1.6}
select option{background:#1a1025;color:#fff}
label{display:block;font-size:12px;font-weight:700;color:rgba(167,139,250,0.9);margin-bottom:7px;text-transform:uppercase;letter-spacing:.09em}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;transition:all .22s;overflow:hidden}
.card:hover{border-color:rgba(124,58,237,0.3);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.card:active{transform:scale(.98)}

/* Tool grid cards */
.tool-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 16px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.tool-card::before{content:'';position:absolute;inset:0;background:var(--grad-card,linear-gradient(135deg,rgba(124,58,237,.06),transparent));opacity:0;transition:opacity .22s}
.tool-card:hover::before{opacity:1}
.tool-card:hover{border-color:rgba(255,255,255,0.14);transform:translateY(-2px)}
.tool-card:active{transform:scale(.97)}
.tool-icon-wrap{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px}

/* Advanced feature row */
.feat-row{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:17px 18px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.feat-row:hover{border-color:rgba(124,58,237,0.3);background:var(--card2)}
.feat-row:active{transform:scale(.98)}
.feat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.feat-chevron{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:13px;flex-shrink:0;margin-left:auto}

/* Result cards */
.result-card{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;transition:all .2s;display:flex;align-items:flex-start;gap:12px;margin-bottom:9px}
.result-card:hover{background:rgba(255,255,255,0.07);border-color:rgba(124,58,237,0.25)}
.rnum{width:26px;height:26px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#a78bfa;background:rgba(124,58,237,0.18);margin-top:1px}

/* Animations */
@keyframes fade-up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slide-in{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes toast-in{from{opacity:0;transform:translateY(20px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes orb{0%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}100%{transform:translate(0,0)}}
@keyframes counter-pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes thinking{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
@keyframes bar-grow{from{width:0}to{width:var(--w)}}
@keyframes modal-in{from{opacity:0;transform:scale(.96) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes ring{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.4);opacity:0}}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes ad-in{from{opacity:0}to{opacity:1}}

.fu{animation:fade-up .5s ease both}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}

/* Spinner */
.spinner{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
.dot{width:8px;height:8px;background:#a78bfa;border-radius:50%;animation:thinking 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

/* Navbar */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06)}
.nav-logo{font-size:20px;font-weight:800;letter-spacing:-.01em;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-bell{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:all .18s}
.nav-bell:hover{background:rgba(255,255,255,.12)}
.nav-ham{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .18s}
.nav-ham:hover{background:rgba(255,255,255,.12)}
.desk-nav{display:flex;gap:20px;align-items:center}
@media(max-width:768px){.desk-nav{display:none}}
@media(min-width:769px){.mob-only{display:none}}

/* Mobile drawer */
.drawer{position:fixed;inset:0;z-index:980;background:rgba(10,10,15,.97);backdrop-filter:blur(24px);padding:70px 20px 32px;overflow-y:auto;animation:fade-in .18s ease both}
.dr-item{display:flex;align-items:center;gap:14px;width:100%;padding:16px 18px;border-radius:16px;background:none;color:rgba(255,255,255,.6);font-size:17px;font-weight:500;cursor:pointer;text-align:left;transition:all .18s;margin-bottom:4px}
.dr-item:hover,.dr-item.active{background:rgba(124,58,237,.14);color:#fff}
.dr-item.active{color:#a78bfa}

/* Live counter */
.live-pill{display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:10px 18px;font-size:14px;font-weight:600;color:rgba(255,255,255,.85)}
.live-ring{position:relative;display:flex;align-items:center;justify-content:center;width:12px;height:12px;flex-shrink:0}
.live-ring::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid #ef4444;animation:ring 1.6s ease-out infinite}
.live-dot{width:12px;height:12px;background:#ef4444;border-radius:50%;position:relative;z-index:1}

/* Section titles */
.sec-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:14px;letter-spacing:-.01em}
.sec-sub{font-size:13px;color:var(--txt2);margin-bottom:16px}

/* Trend chips */
.trend-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.trend-scroll::-webkit-scrollbar{display:none}
.trend-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:9px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:50px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .2s;white-space:nowrap}
.trend-chip:hover,.trend-chip:active{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.35);color:#fff}

/* Tag chips */
.tag{display:inline-flex;align-items:center;background:rgba(124,58,237,.14);border:1px solid rgba(124,58,237,.28);border-radius:50px;padding:5px 12px;font-size:12px;font-weight:600;color:#a78bfa}

/* Ad */
.ad-wrap{display:flex;flex-direction:column;align-items:center;margin:16px 0;animation:ad-in .5s ease both}
.ad-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.18);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px}
.ad-box{background:rgba(0,0,0,.25);border-radius:14px;padding:10px;border:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Bottom nav */
.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:970;background:rgba(10,10,15,.96);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;padding:10px 0 calc(10px + env(safe-area-inset-bottom))}
@media(min-width:769px){.bot-nav{display:none}}
.bot-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;color:rgba(255,255,255,.4);font-size:11px;font-weight:600;padding:4px 14px;border-radius:12px;transition:all .18s;flex:1}
.bot-btn .bi{font-size:22px;transition:all .18s}
.bot-btn.active{color:#a78bfa}
.bot-btn.active .bi{transform:scale(1.12)}

/* Tool input area */
.input-area{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:20px;padding:20px}

/* Hint */
.hint{display:flex;align-items:center;gap:8px;padding:9px 14px;background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.2);border-radius:11px;font-size:12px;color:#93c5fd;margin-bottom:14px;flex-wrap:wrap;gap:6px}

/* Error */
.err{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.22);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-top:10px}

/* Sec header */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-bar{width:3px;height:20px;border-radius:2px;flex-shrink:0}

/* Modal */
.modal-over{position:fixed;inset:0;z-index:2000;background:rgba(5,5,12,.9);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fade-in .18s ease both}
@media(min-width:600px){.modal-over{align-items:center;padding:16px}}
.modal-box{background:#111118;border:1px solid rgba(255,255,255,.1);border-radius:24px 24px 0 0;width:100%;max-width:740px;max-height:92vh;overflow-y:auto;animation:slide-up .3s ease both}
@media(min-width:600px){.modal-box{border-radius:24px;animation:modal-in .3s ease both}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0;position:sticky;top:0;background:rgba(17,17,24,.97);z-index:1;border-radius:24px 24px 0 0}
.modal-body{padding:18px 22px 28px}
.modal-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;flex-shrink:0}
.modal-close:hover{background:rgba(255,255,255,.14);color:#fff}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 16px}

/* Score bar */
.score-track{background:rgba(255,255,255,.08);border-radius:999px;height:9px;overflow:hidden}
.score-fill{height:100%;border-radius:999px;animation:bar-grow 1s cubic-bezier(.34,1.56,.64,1) both}

/* Cal day */
.cal-day{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:15px}

/* BA panels */
.ba-b{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18);border-radius:16px;padding:16px;flex:1;min-width:0}
.ba-a{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.18);border-radius:16px;padding:16px;flex:1;min-width:0}
.ba-row{padding:10px 12px;border-radius:10px;margin-bottom:8px;font-size:13px;line-height:1.55}
.ba-b .ba-row{background:rgba(239,68,68,.08);color:#fca5a5}
.ba-a .ba-row{background:rgba(16,185,129,.08);color:#6ee7b7}

/* HP */
.hp-h{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#fca5a5}
.hp-m{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.28);color:#fde68a}
.hp-l{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.28);color:#6ee7b7}

/* Legal */
.legal h2{font-size:17px;font-weight:700;color:#fff;margin:26px 0 8px}
.legal p,.legal li{color:var(--txt2);font-size:14px;line-height:1.75}
.legal ul{padding-left:18px;margin:8px 0}
.legal a{color:#a78bfa}

/* PW highlight */
.pw{color:#fde68a;font-weight:700}

/* Page wrapper */
.page{padding:78px 18px 24px;max-width:680px;margin:0 auto}
.page-wide{padding:78px 18px 24px;max-width:1100px;margin:0 auto}
</style>

const PW_SC=["secret","free","viral","shocking","proven","ultimate","insane","best","mistake","exposed","truth","hidden","fastest","hack","game-changer"];
function scoreTitle(title){
  if(!title||title.trim().length<3)return null;
  const t=title.toLowerCase();let score=0;const notes=[];
  const len=title.length;
  if(len>=40&&len<=60){score+=25;notes.push({ok:true,msg:`✅ Perfect length (${len} chars)`});}
  else if(len>=30){score+=14;notes.push({ok:false,msg:`⚠️ ${len<40?"Too short":"A bit long"} (${len} chars) — ideal 40–60`});}
  else{score+=4;notes.push({ok:false,msg:`❌ Too short (${len} chars)`});}
  if(/\d/.test(title)){score+=20;notes.push({ok:true,msg:"✅ Has a number — boosts CTR by 36%"});}
  else notes.push({ok:false,msg:"❌ No number — try '7 Ways' or '30 Days'"});
  const pw=PW_SC.filter(w=>t.includes(w));
  if(pw.length){score+=Math.min(pw.length*10,25);notes.push({ok:true,msg:`✅ Power words: ${pw.map(w=>'"'+w+'"').join(", ")}`});}
  else notes.push({ok:false,msg:"❌ No power words — add: Secret, Proven, Viral"});
  if(title.includes("?")||title.includes("!")){score+=10;notes.push({ok:true,msg:"✅ Punctuation adds curiosity & urgency"});}
  score=Math.max(0,Math.min(100,score));
  const color=score>=75?"#6ee7b7":score>=50?"#fde68a":"#fca5a5";
  const label=score>=75?"Excellent 🔥":score>=60?"Good ⚡":score>=40?"Fair 📈":"Needs Work ❌";
  const suggestions=[score<70&&!pw.length?`Add power word: "The ${pick(["Proven","Secret","Ultimate"])} Guide to..."`:null,!/\d/.test(title)?`Add number: "...in ${pick(["7","10","30"])} Days"`:null,len<40?`Expand: "${title} (${pick(["Step-By-Step","Full Guide"])})"`:null,len>65?"Trim under 65 chars":null,].filter(Boolean).slice(0,3);
  return{score,color,label,notes,suggestions};
}

  const copy=useCallback((text,key)=>{try{navigator.clipboard.writeText(text)}catch(e){};setCopied(key);if("vibrate"in navigator)navigator.vibrate(25);setTimeout(()=>setCopied(null),1800);},[]);

}

}

      {type:"p",text:"YouTube ranks videos based on three primary factors: relevance (does the video match the search query?), engagement (do people watch, like, and comment?), and quality signals (watch time, subscriber growth, channel authority). Optimising for all three is the key to sustained search visibility."},
      {type:"h2",text:"Keyword Research for YouTube"},

function BlogPostPage({post,go,setTool}){
  if(!post)return null;
  const {copied,copy}=useCopy();
  const {toasts,show}=useToast();
  const shareUrl=`https://virlofy.ai/blog/${post.id}`;
  return(
    <div style={{padding:"78px 18px 24px",maxWidth:680,margin:"0 auto"}}>
      <Toast toasts={toasts}/>
      {/* Back */}
      <button className="btn-outline" onClick={()=>go(R.BLOG)} style={{marginBottom:22,padding:"9px 16px",fontSize:13,borderRadius:50}}>← Back to Blog</button>

      {/* Header */}
      <div style={{marginBottom:28}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",padding:"5px 12px",borderRadius:999,background:post.tagBg,color:post.tagColor}}>{post.tag}</span>
        </div>
        <div style={{fontSize:40,marginBottom:14}}>{post.emoji}</div>
        <h1 style={{fontSize:"clamp(22px,5vw,36px)",fontWeight:900,lineHeight:1.15,letterSpacing:"-.02em",marginBottom:14}}>{post.title}</h1>
        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#fff"}}>V</div>
            <span style={{fontSize:13,fontWeight:600,color:"var(--txt2)"}}>Virlofy Team</span>
          </div>
          <span style={{fontSize:12,color:"var(--txt3)"}}>·</span>
          <span style={{fontSize:12,color:"var(--txt3)"}}>{post.date}</span>
          <span style={{fontSize:12,color:"var(--txt3)"}}>·</span>
          <span style={{fontSize:12,color:"var(--txt3)"}}>{post.readTime}</span>
          <button className={`btn-copy${copied==="url"?" done":""}`} onClick={()=>{copy(shareUrl,"url");show("Link copied!");}} style={{marginLeft:"auto",fontSize:11}}>
            {copied==="url"?"✓ Copied":"🔗 Share"}
          </button>
        </div>
      </div>

      <AdB/>

      {/* Content */}
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {post.content.map((block,i)=>{
          if(block.type==="intro") return <p key={i} style={{fontSize:17,fontWeight:500,color:"rgba(255,255,255,.8)",lineHeight:1.8,padding:"18px 20px",background:"rgba(124,58,237,.07)",border:"1px solid rgba(124,58,237,.2)",borderRadius:14}}>{block.text}</p>;
          if(block.type==="h2")   return <h2 key={i} style={{fontSize:"clamp(18px,4vw,22px)",fontWeight:800,letterSpacing:"-.01em",marginTop:8,paddingTop:8}}>{block.text}</h2>;
          if(block.type==="p")    return <p key={i} style={{fontSize:15,color:"var(--txt2)",lineHeight:1.8}}>{block.text}</p>;
          if(block.type==="tip")  return <div key={i} style={{padding:"14px 18px",background:"rgba(59,130,246,.08)",border:"1px solid rgba(59,130,246,.22)",borderRadius:14,fontSize:14,color:"#93c5fd",lineHeight:1.7}}>{block.text}</div>;
          if(block.type==="conclusion") return <div key={i} style={{padding:"18px 20px",background:"linear-gradient(135deg,rgba(124,58,237,.1),rgba(59,130,246,.07))",border:"1px solid rgba(124,58,237,.22)",borderRadius:16,fontSize:15,color:"rgba(255,255,255,.85)",lineHeight:1.75,fontWeight:500,marginTop:8}}><strong>Conclusion: </strong>{block.text}</div>;
          if(block.type==="list") return(
            <ul key={i} style={{paddingLeft:6,display:"flex",flexDirection:"column",gap:10}}>
              {block.items.map((item,j)=>(
                <li key={j} style={{fontSize:14,color:"var(--txt2)",lineHeight:1.7,display:"flex",gap:10,alignItems:"flex-start",listStyle:"none"}}>
                  <span style={{color:"#a78bfa",flexShrink:0,marginTop:2}}>→</span>{item}
                </li>
              ))}
            </ul>
          );
          return null;
        })}
      </div>

      <AdR style={{marginTop:24}}/>

      {/* CTA */}
      <div style={{background:"linear-gradient(135deg,rgba(124,58,237,.12),rgba(59,130,246,.08))",border:"1px solid rgba(124,58,237,.22)",borderRadius:20,padding:"22px",textAlign:"center",marginTop:8,marginBottom:28}}>
        <h3 style={{fontWeight:800,fontSize:17,marginBottom:8}}>Try These Strategies Now 🚀</h3>
        <p style={{color:"var(--txt2)",fontSize:14,marginBottom:16,lineHeight:1.6}}>Use Virlofy's free AI tools to apply everything in this article instantly.</p>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn-grad" onClick={()=>go(R.ALL)} style={{borderRadius:50,padding:"12px 24px"}}>Try All Tools Free</button>
          <button className="btn-outline" onClick={()=>go(R.BLOG)} style={{borderRadius:50,padding:"12px 24px"}}>← More Articles</button>
        </div>
      </div>

      {/* Related posts */}
      <h3 style={{fontWeight:800,fontSize:17,marginBottom:14}}>More Articles</h3>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {BLOG_POSTS.filter(p=>p.id!==post.id).slice(0,3).map((p,i)=>(
          <div key={p.id} onClick={()=>{setBlogPost(p);window.scrollTo({top:0,behavior:"smooth"});}}
            style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,transition:"all .2s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(124,58,237,.3)"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,.08)"}>
            <span style={{fontSize:24,flexShrink:0}}>{p.emoji}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,lineHeight:1.35,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.title}</div>
              <div style={{fontSize:11,color:"var(--txt3)",marginTop:3}}>{p.readTime}</div>
            </div>
            <span style={{color:"#a78bfa",fontSize:16,flexShrink:0}}>›</span>
          </div>
        ))}
      </div>

      <Footer go={go} setTool={setTool}/>
    </div>
  );
}

/* ── App ── */
function App(){
  const [route,setRoute]=useState(R.HOME);
  const [tool,setTool]=useState(null);
  const [blogPost,setBlogPost]=useState(null);
  const go=useCallback(r=>{setRoute(r);window.scrollTo({top:0,behavior:"smooth"});},[]);

  const pages={
    [R.HOME]:     <HomePage     go={go} setTool={setTool}/>,
    [R.YT]:       <ToolListPage go={go} setTool={setTool} mode="yt"/>,
    [R.IG]:       <ToolListPage go={go} setTool={setTool} mode="ig"/>,
    [R.ALL]:      <ToolListPage go={go} setTool={setTool} mode="all"/>,
    [R.TRENDING]: <TrendingPage go={go} setTool={setTool}/>,
    [R.ABOUT]:    <AboutPage    go={go} setTool={setTool}/>,
    [R.FAQ]:      <FAQPage      go={go} setTool={setTool}/>,
    [R.BLOG]:     <BlogListPage go={go} setTool={setTool} setBlogPost={setBlogPost}/>,
    [R.BLOGPOST]: <BlogPostPage post={blogPost} go={go} setTool={setTool} setBlogPost={setBlogPost}/>,
    [R.PRIVACY]:  <LegalPage    go={go} setTool={setTool} type="privacy"/>,
    [R.TERMS]:    <LegalPage    go={go} setTool={setTool} type="terms"/>,
    [R.CONTACT]:  <ContactPage  go={go} setTool={setTool}/>,
    [R.TOOL]:     <ToolPage     tool={tool} go={go} setTool={setTool}/>,
  };

  return(
    <div style={{position:"relative",minHeight:"100vh",overflowX:"hidden"}}>
      <OrbBg/>
      <div style={{position:"relative",zIndex:1}}>
        <Navbar cur={route} go={go}/>
        {pages[route]||pages[R.HOME]}
      </div>
      <BotNav cur={route} go={go} setTool={setTool}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
