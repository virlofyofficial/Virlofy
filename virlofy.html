<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>

  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07040f; --surface: rgba(255,255,255,0.04); --surface-h: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08); --border-glow: rgba(139,92,246,0.35);
      --purple: #7c3aed; --purple-l: #a78bfa; --blue: #3b82f6; --blue-l: #93c5fd;
      --pink: #ec4899; --text: #f0eaff; --text-m: rgba(196,181,253,0.6); --text-d: rgba(196,181,253,0.32);
      --grad: linear-gradient(135deg,#7c3aed,#3b82f6); --grad-p: linear-gradient(135deg,#7c3aed,#ec4899);
      --fh: 'Bricolage Grotesque',sans-serif; --fb: 'DM Sans',sans-serif;
      --r: 16px; --rs: 10px; --rl: 24px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--fb); line-height: 1.6; overflow-x: hidden; min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 3px; }

    .g-text { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .g-pink  { background: var(--grad-p); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .glass { background: var(--surface); border: 1px solid var(--border); backdrop-filter: blur(12px); }
    .glass-glow { background: rgba(124,58,237,0.06); border: 1px solid var(--border-glow); backdrop-filter: blur(12px); }

    button { font-family: var(--fb); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:11px 22px; border-radius:var(--rs); font-size:14px; font-weight:600; border:none; transition:all 0.2s; outline:none; user-select:none; }
    .btn-p { background:var(--grad); color:#fff; box-shadow:0 4px 18px rgba(124,58,237,0.35); }
    .btn-p:hover { opacity:.88; transform:translateY(-1px); box-shadow:0 6px 24px rgba(124,58,237,0.45); }
    .btn-p:active { transform:translateY(0); }
    .btn-p:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-g { background:var(--surface); color:var(--text-m); border:1px solid var(--border); }
    .btn-g:hover { background:var(--surface-h); color:var(--text); }
    .btn-c { background:rgba(139,92,246,0.1); color:var(--purple-l); border:1px solid rgba(139,92,246,0.25); padding:6px 12px; font-size:12px; border-radius:7px; font-weight:600; transition:all 0.18s; white-space:nowrap; }
    .btn-c:hover { background:rgba(139,92,246,0.2); }
    .btn-c.ok { background:rgba(16,185,129,0.15); color:#6ee7b7; border-color:rgba(16,185,129,0.3); }

    input, textarea, select { width:100%; padding:11px 14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:var(--rs); color:var(--text); font-family:var(--fb); font-size:14px; outline:none; transition:border-color 0.18s; -webkit-appearance:none; }
    input:focus, textarea:focus, select:focus { border-color:var(--border-glow); }
    input::placeholder, textarea::placeholder { color:var(--text-d); }
    textarea { resize:vertical; min-height:80px; line-height:1.6; }
    select option { background:#1a1030; color:var(--text); }
    label { display:block; font-size:12px; font-weight:600; color:var(--purple-l); margin-bottom:6px; text-transform:uppercase; letter-spacing:.08em; }

    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:20px; transition:all .22s; }
    .card:hover { background:var(--surface-h); border-color:rgba(255,255,255,0.12); transform:translateY(-2px); }
    .rc { background:rgba(255,255,255,0.035); border:1px solid var(--border); border-radius:12px; padding:14px 16px; transition:background .18s; display:flex; align-items:flex-start; gap:10px; }
    .rc:hover { background:rgba(255,255,255,0.055); }
    .rn { width:24px; height:24px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--purple-l); background:rgba(124,58,237,0.15); border:1px solid rgba(124,58,237,0.2); margin-top:2px; }

    @keyframes fade-up { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fade-in { from{opacity:0} to{opacity:1} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes orb-drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(40px,-30px) scale(1.08)} 66%{transform:translate(-20px,20px) scale(.95)} 100%{transform:translate(0,0) scale(1)} }
    @keyframes slide-in { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
    @keyframes toast-in { from{opacity:0;transform:translateY(16px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes pulse-glow { 0%,100%{box-shadow:0 0 20px rgba(124,58,237,0.3)} 50%{box-shadow:0 0 40px rgba(124,58,237,0.6)} }

    .vu { animation:fade-up .55s ease both; }
    .d1{animation-delay:.08s} .d2{animation-delay:.16s} .d3{animation-delay:.24s} .d4{animation-delay:.32s} .d5{animation-delay:.40s}

    .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }

    .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.05em; }
    .b-ai { background:rgba(124,58,237,0.18); color:#c4b5fd; border:1px solid rgba(124,58,237,0.3); }
    .b-yt { background:rgba(239,68,68,0.15); color:#fca5a5; border:1px solid rgba(239,68,68,0.3); }
    .b-ig { background:rgba(236,72,153,0.15); color:#f9a8d4; border:1px solid rgba(236,72,153,0.3); }
    .b-hot { background:rgba(251,191,36,0.15); color:#fde68a; border:1px solid rgba(251,191,36,0.3); }

    .ad-slot { background:repeating-linear-gradient(45deg,rgba(255,255,255,.015),rgba(255,255,255,.015) 6px,transparent 6px,transparent 12px); border:1px dashed rgba(255,255,255,.07); border-radius:var(--rs); display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.15); font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; }

    .nav-link { position:relative; padding:6px 0; font-size:14px; font-weight:500; color:var(--text-m); cursor:pointer; transition:color .18s; background:none; border:none; }
    .nav-link::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--grad); border-radius:1px; transform:scaleX(0); transition:transform .2s; }
    .nav-link:hover { color:var(--text); }
    .nav-link:hover::after, .nav-link.active::after { transform:scaleX(1); }
    .nav-link.active { color:var(--text); }

    .mob-drawer { position:fixed; top:64px; left:0; right:0; bottom:0; z-index:900; background:rgba(7,4,15,.97); backdrop-filter:blur(20px); padding:12px 16px 32px; overflow-y:auto; animation:fade-in .18s ease both; }
    .mob-item { display:flex; align-items:center; gap:10px; width:100%; padding:14px 16px; border-radius:12px; border:none; background:none; color:var(--text-m); font-size:16px; font-weight:500; cursor:pointer; text-align:left; transition:all .18s; }
    .mob-item:hover, .mob-item.active { background:rgba(124,58,237,0.12); color:var(--text); }

    .nd { display:flex; }
    @media(max-width:768px){.nd{display:none!important}}
    .mb { display:none; }
    @media(max-width:768px){.mb{display:flex!important;align-items:center;justify-content:center}}
    @media(max-width:640px){.sh{display:none!important}}

    .sec-hdr { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .sec-bar { width:4px; height:22px; border-radius:2px; flex-shrink:0; }
    .tag-chip { display:inline-flex; align-items:center; background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.25); border-radius:999px; padding:4px 12px; font-size:12px; font-weight:500; color:var(--purple-l); }
    .hero-bg { background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(124,58,237,0.22) 0%,transparent 60%), radial-gradient(ellipse 50% 40% at 80% 50%,rgba(59,130,246,0.12) 0%,transparent 55%), var(--bg); }
    .legal h2 { font-family:var(--fh); font-size:18px; font-weight:700; color:var(--text); margin:28px 0 8px; }
    .legal p, .legal li { color:var(--text-m); font-size:14px; line-height:1.75; }
    .legal ul { padding-left:20px; margin:8px 0; }
    .legal a { color:var(--purple-l); }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Routes ── */
const R = { HOME:"home", YT:"yt", IG:"ig", ALL:"all", ABOUT:"about", PRIVACY:"privacy", TERMS:"terms", CONTACT:"contact", TOOL:"tool" };

/* ── Tool definitions ── */
const YT_TOOLS = [
  { id:"yt-title",     icon:"🔥", name:"Title + Thumbnail Generator", desc:"10 viral titles, 5 thumbnail ideas & 5 hook lines",          badge:"yt", popular:true },
  { id:"yt-hook",      icon:"⚡", name:"Hook Generator",               desc:"5–7 scroll-stopping first-5-second video openers",           badge:"yt" },
  { id:"yt-script",    icon:"📋", name:"Script Idea Generator",        desc:"Full video structure: Intro, Main Points & Outro",           badge:"yt" },
  { id:"yt-ideas",     icon:"💡", name:"Video Idea Generator",         desc:"10 viral video ideas tailored to your niche",                badge:"yt" },
  { id:"yt-thumbnail", icon:"🖼️", name:"Thumbnail Text Generator",    desc:"8+ bold, click-worthy thumbnail text options",               badge:"yt" },
  { id:"yt-tags",      icon:"🏷️", name:"Tags Generator",              desc:"10–15 SEO-optimised YouTube tags for any topic",             badge:"yt" },
];
const IG_TOOLS = [
  { id:"ig-caption",  icon:"✍️", name:"Caption Generator",           desc:"4 unique, engaging captions for any post topic",            badge:"ig", popular:true },
  { id:"ig-hashtag",  icon:"#️⃣", name:"Hashtag Generator",           desc:"3 smart hashtag sets mixing popular & niche tags",          badge:"ig" },
  { id:"ig-bio",      icon:"👤", name:"Bio Generator",               desc:"4 magnetic bios that convert visitors to followers",        badge:"ig" },
  { id:"ig-reel",     icon:"🎬", name:"Reel Hook Generator",         desc:"5 scroll-stopping opening lines for your Reels",            badge:"ig" },
  { id:"ig-viral",    icon:"🚀", name:"Viral Idea Generator",        desc:"5 data-driven ideas guaranteed to drive engagement",        badge:"ig" },
];

/* ── Template helpers ── */
const pick = a => a[Math.floor(Math.random()*a.length)];
const shuffle = a => [...a].sort(()=>Math.random()-.5);
const PW = ["Secret","Hidden","Proven","Shocking","Viral","Ultimate","Insane","Honest","Real","Fastest","Easiest","Untold","Raw","Brutal"];
const YR = new Date().getFullYear();

function genTitles(t,n){ const s=n?` (${n})`:""; return shuffle([
  `${pick(PW)} Truth About ${t}${s} Nobody Is Talking About`,
  `I Tried ${t} For 30 Days — Here's What Happened`,
  `The ${pick(PW)} Guide to ${t} in ${YR}`,
  `Stop Making These ${t} Mistakes (${pick(PW)} Tips Inside)`,
  `How I Went From 0 to 100K With ${t}${s}`,
  `${pick(PW)} ${t} Hacks That Actually Work`,
  `Why Your ${t} Strategy Is Failing (Fix This Now)`,
  `I Exposed The ${t} Industry — Watch Before It's Gone`,
  `${t}: What They Don't Want You To Know${s}`,
  `The Only ${t} Video You'll Ever Need in ${YR}`,
  `${pick(PW)} ${t} Tips That Changed Everything`,
  `From Zero to $10K/Month With ${t}${s}`,
]).slice(0,10); }

function genThumbnails(t){ return [
  { text:pick(["WAIT—","STOP!","NO WAY","REAL?!","INSANE"]), detail:`Split face reaction + bold text "${(t||"topic").toUpperCase()}"` },
  { text:"I WAS WRONG", detail:"Before/after comparison layout with shocked expression" },
  { text:pick(["$0 → $10K","0 → 1M","BROKE → RICH"]), detail:"Arrow graphic, bright contrast colours, minimal text" },
  { text:"THIS CHANGED EVERYTHING", detail:"Close-up face, blurred background, high contrast overlay" },
  { text:pick(["SECRET","HIDDEN","EXPOSED"]), detail:"Dark moody vibe, neon accent text, mystery element" },
]; }

function genYtHooks(t){ return shuffle([
  `"You're wasting your time if you haven't tried ${t} yet — but not after this video."`,
  `"I almost didn't make this video… but you deserve to know the truth about ${t}."`,
  `"What if I told you everything you know about ${t} is completely wrong?"`,
  `"In the next 60 seconds I'm going to show you something that took me 3 years to learn about ${t}."`,
  `"Stop scrolling. If you're struggling with ${t}, this is the only video you need to watch."`,
  `"Most creators skip this one step with ${t} — and it's costing them thousands of views."`,
  `"This ${t} method made me $0 for 6 months… until I changed ONE thing."`,
]).slice(0,5); }

function genScript(t,n){ const p=pick(["step-by-step","proven","counter-intuitive"]); return {
  intro:[
    `Hook: "${pick(["Did you know","What if I told you","Here's the brutal truth"])}" — state immediately what viewers will gain.`,
    `Open with a bold claim or surprising statistic about ${t}.`,
    `Show a quick preview of the end result to build anticipation.`,
  ],
  main:[
    `Point 1 — The Problem: Why most people struggle with ${t} and the #1 mistake they make.`,
    `Point 2 — The Method: Your ${p} approach to ${t}. Use a real example.`,
    `Point 3 — The Results: Share data, before/after, or case study. Build credibility.`,
    `Point 4 — The Shortcuts: 2–3 actionable tips viewers can apply TODAY.`,
    `Midroll: Ask viewers to comment their biggest challenge with ${t}.`,
  ],
  outro:[
    `Summarise the key takeaway in ONE sentence.`,
    `CTA: "If this helped, smash the like button — it literally takes 1 second."`,
    `Tease next video: "In my next video I'll show you how to take ${t} to the next level."`,
    `Subscribe plug: "Join thousands of creators — subscribe now."`,
  ],
}; }

function genVideoIdeas(n){ return shuffle([
  `I Tested Every ${n} Strategy So You Don't Have To — Here Are The Results`,
  `The ${n} Blueprint: How I'd Start From Zero in ${YR} (Step-By-Step)`,
  `Reacting to the WORST ${n} Advice on the Internet`,
  `${pick(PW)} ${n} Tools You're Probably Not Using`,
  `I Interviewed 10 Top ${n} Creators — Here's What They All Said`,
  `${n} Myths That Are Costing You Views & Growth`,
  `Day in the Life of a ${n} Creator (Honest & Unfiltered)`,
  `${n} Tier List: Rating Every Strategy From S to F`,
  `$0 vs $100 vs $1000 ${n} Setup — Which Is Actually Worth It?`,
  `The ${n} Video That Changed My Channel Forever`,
  `What 1 Year in ${n} Taught Me (Mistakes, Wins & Lessons)`,
  `Hot Take: The Future of ${n} is NOT What You Think`,
]).slice(0,10); }

function genThumbTexts(t){ const u=(t||"topic").toUpperCase(); return shuffle([
  `${pick(PW).toUpperCase()} ${u}`,`I WAS WRONG ABOUT ${u}`,`${u} EXPOSED`,`THIS CHANGED EVERYTHING`,
  `STOP DOING THIS`,`THE TRUTH ABOUT ${u}`,`YOU WON'T BELIEVE THIS`,`GAME CHANGER`,
  `NOBODY TELLS YOU THIS`,`FINALLY — THE ANSWER`,`IT ACTUALLY WORKS`,`${u} IN ${YR}`,
]).slice(0,8); }

function genTags(t,n){ const base=[
  t,`${t} tips`,`${t} tutorial`,`${t} ${YR}`,`how to ${t}`,`${t} for beginners`,
  `best ${t}`,`${n||"creator"} ${t}`,`${t} guide`,`${t} strategy`,`${t} hacks`,
  `${t} mistakes`,`${n||"creator"} tips`,`${n||"creator"} growth`,`viral ${t}`,
]; return shuffle(base).slice(0,13); }

function genCaptions(t,n){ return shuffle([
  `✨ ${pick(["Real talk:","Hot take:","Unpopular opinion:"])} ${t} is the thing nobody talks about — until now. Drop a 💬 if you can relate.${n?`\n\n#${n.toLowerCase().replace(/\s/g,"")} #creator`:""}`,
  `POV: You finally figured out ${t} 🔥\n\nThis one changed everything for me. Save this for later — you'll thank me.\n\n👇 What's YOUR take?`,
  `${t} hit different today. ✨\n\nSometimes you just need to trust the process and keep showing up. Who else is in this season?\n\n💜 Double tap if this is you`,
  `Nobody prepares you for the ${t} era 😅\n\nBut honestly? It's the best thing that's happened to me.\n\nTell me your story below 👇`,
  `3 things ${t} taught me:\n1️⃣ Consistency > perfection\n2️⃣ Your story matters\n3️⃣ Start before you're ready\n\n${pick(["Which hits hardest?","Save for when you need it.","Share with someone who needs this."])}`,
]).slice(0,4); }

function genHashtags(t){ const k=(t||"content").toLowerCase().replace(/\s+/g,""); return [
  `#${k} #${k}tips #${k}community #${k}life #${k}creator #contentcreator #creatortips #growyourinstagram #instagramgrowth #socialmediastrategy`,
  `#${k}goals #${k}motivation #${k}vibes #${k}inspo #${k}daily #instadaily #reelsviral #reelsinstagram #explorepage #instareels`,
  `#${k}niche #${k}brand #${k}journey #${k}success #${k}mindset #smallcreator #creatoreconomy #buildyourbrand #onlinebusiness #passiveincome`,
]; }

function genBios(n){ const nn=n||"content creator"; return shuffle([
  `✨ ${nn} helping you grow online\n🚀 Helping creators level up\n📩 Collab → link below`,
  `${nn.charAt(0).toUpperCase()+nn.slice(1)} 🎯\nI share what actually works (no fluff)\n💡 New content every week`,
  `Turning ${nn} into a career 💸\nPosting daily ✅\n👇 My free ${nn} toolkit`,
  `Hey! I'm your go-to for ${nn}\n⚡ Tips that saved me years\n💬 DM me anything, I reply!`,
  `${nn} simplified 🧠✨\nCreating from 🌍\n📌 Start here 👇`,
]).slice(0,4); }

function genReelHooks(t){ return shuffle([
  `"Wait — don't scroll. If you've ever struggled with ${t}, you need to see this."`,
  `"POV: You just discovered the ${t} hack that changes EVERYTHING."`,
  `"I'm about to tell you something about ${t} that took me 3 years to learn — in 30 seconds."`,
  `"This ${t} mistake is costing you — and nobody is talking about it."`,
  `"The most common lie about ${t}: that you need to be perfect before you start."`,
  `"If ${t} has been stressing you out, watch this. Right now."`,
  `"I was embarrassed to share this ${t} story… but here we go."`,
]).slice(0,5); }

function genViralIdeas(n){ return shuffle([
  { fmt:"Reel",     idea:`"A day in the life" as a ${n} creator — raw and unfiltered. Performs 3x better than polished content right now.` },
  { fmt:"Carousel", idea:`"${pick(["5","7","10"])} mistakes I made in ${n} so you don't have to" — save-worthy posts get massive reach.` },
  { fmt:"Reel",     idea:`React to the worst ${n} advice on the internet — controversy + value = algorithm gold.` },
  { fmt:"Post",     idea:`Aesthetic quote from a ${n} creator with a hot take in the caption — shareable content builds followers fast.` },
  { fmt:"Carousel", idea:`Before/after transformation in ${n} — results-focused posts get 4x the saves.` },
  { fmt:"Reel",     idea:`"What I wish I knew before starting ${n}" — super relatable, huge engagement for new creators.` },
  { fmt:"Stories",  idea:`Poll your audience on their #1 ${n} struggle — builds engagement AND gives you future content ideas.` },
]).slice(0,5); }

/* ── Hooks ── */
function useCopy(){
  const [copied,setCopied]=useState(null);
  const copy=useCallback((text,key)=>{ try{navigator.clipboard.writeText(text)}catch(e){}; setCopied(key); setTimeout(()=>setCopied(null),1800); },[]);
  return {copied,copy};
}
function useToast(){
  const [toasts,setToasts]=useState([]);
  const show=useCallback(msg=>{ const id=Date.now(); setToasts(t=>[...t,{id,msg}]); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2500); },[]);
  return {toasts,show};
}

/* ── UI Atoms ── */
function OrbBg(){
  const orbs=[
    {w:500,h:500,top:"-10%",left:"-10%",c:"rgba(124,58,237,0.12)",d:"20s"},
    {w:400,h:400,top:"30%",right:"-8%",c:"rgba(59,130,246,0.1)",d:"26s"},
    {w:350,h:350,bottom:"5%",left:"20%",c:"rgba(236,72,153,0.07)",d:"18s"},
    {w:300,h:300,top:"60%",right:"25%",c:"rgba(124,58,237,0.07)",d:"22s"},
  ];
  return (
    <div style={{position:"fixed",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
      {orbs.map((o,i)=>(
        <div key={i} style={{position:"absolute",width:o.w,height:o.h,top:o.top,left:o.left,right:o.right,bottom:o.bottom,background:`radial-gradient(circle,${o.c} 0%,transparent 70%)`,borderRadius:"50%",animation:`orb-drift ${o.d} ease-in-out infinite`,animationDelay:`${i*3}s`,filter:"blur(1px)"}}/>
      ))}
      <div style={{position:"absolute",inset:0,backgroundImage:"linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px)",backgroundSize:"50px 50px"}}/>
    </div>
  );
}

function Toast({toasts}){
  if(!toasts.length) return null;
  return (

        <form onSubmit={submit} className="glass-glow" style={{borderRadius:24,padding:"24px 22px"}}>
          <div style={{marginBottom:16}}><label>Name *</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
          <div style={{marginBottom:16}}><label>Email *</label><input type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
          <div style={{marginBottom:16}}><label>Message *</label><textarea rows={5} value={form.msg} onChange={e=>setForm(f=>({...f,msg:e.target.value}))}/></div>
          <button type="submit" className="btn btn-p" style={{width:"100%",justifyContent:"center",padding:"13px",borderRadius:12,fontSize:15}}>✉️ Send Message</button>
          <p style={{textAlign:"center",fontSize:12,color:"var(--text-d)",marginTop:12}}>Or email: <a href="mailto:support@virlofy.com" style={{color:"var(--purple-l)"}}>support@virlofy.com</a></p>
        </form>
      ):(
        <div className="glass-glow" style={{borderRadius:24,padding:"36px 24px",textAlign:"center",animation:"fade-up 0.4s ease both"}}>
          <div style={{fontSize:48,marginBottom:12}}>✅</div>
          <h2 style={{fontFamily:"var(--fh)",fontWeight:800,fontSize:22,marginBottom:8}}>Message Sent!</h2>
          <p style={{color:"var(--text-m)",fontSize:14,lineHeight:1.7}}>Thanks! We reply within 24–48 hours at <strong>support@virlofy.com</strong></p>
          <button className="btn btn-g" style={{marginTop:20,borderRadius:10}} onClick={()=>setSent(false)}>Send Another</button>
        </div>
      )}
      <Footer go={go} setTool={setTool}/>
    </div>
  );
}

/* ── App ── */
function App(){
  const [route,setRoute]=useState(R.HOME);
  const [tool,setTool]=useState(null);
  const go=useCallback(r=>{ setRoute(r); window.scrollTo({top:0,behavior:"smooth"}); },[]);

  const pages={
    [R.HOME]:    <HomePage    go={go} setTool={setTool}/>,
    [R.YT]:      <ToolListPage go={go} setTool={setTool} mode="yt"/>,
    [R.IG]:      <ToolListPage go={go} setTool={setTool} mode="ig"/>,
    [R.ALL]:     <ToolListPage go={go} setTool={setTool} mode="all"/>,
    [R.ABOUT]:   <AboutPage   go={go} setTool={setTool}/>,
    [R.PRIVACY]: <PrivacyPage go={go} setTool={setTool}/>,
    [R.TERMS]:   <TermsPage   go={go} setTool={setTool}/>,
    [R.CONTACT]: <ContactPage go={go} setTool={setTool}/>,
    [R.TOOL]:    <ToolPage    tool={tool} go={go} setTool={setTool}/>,
  };

  return (
    <div style={{position:"relative",minHeight:"100vh",overflowX:"hidden"}}>
      <OrbBg/>
      <div style={{position:"relative",zIndex:1}}>
        <Navbar cur={route} go={go}/>
        {pages[route]||pages[R.HOME]}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
